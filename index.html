<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5 Breaths - 呼吸管理</title>

    <!-- PWA Configuration -->
    <meta name="description" content="マインドフルな呼吸で心を整える">
    <meta name="theme-color" content="#1a2332">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="5 Breaths">

    <!-- Icons for iOS -->
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

    <!-- Manifest -->
    <link rel="manifest" href="manifest.json">

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header>
            <h1>5 Breaths</h1>
            <p class="subtitle">呼吸で心を整える</p>
        </header>

        <div class="main-content">
            <!-- Breathing Exercise Section -->
            <section class="breathing-section">
                <!-- Pattern Selector -->
                <div class="pattern-selector">
                    <div class="pattern-cards" id="patternCards">
                        <button class="pattern-card active" data-pattern="5breaths">
                            <span class="pattern-name">5回呼吸</span>
                            <span class="pattern-desc">クイックリセット</span>
                        </button>
                        <button class="pattern-card" data-pattern="478">
                            <span class="pattern-name">4-7-8</span>
                            <span class="pattern-desc">リラックス</span>
                        </button>
                        <button class="pattern-card" data-pattern="box">
                            <span class="pattern-name">ボックス</span>
                            <span class="pattern-desc">集中力</span>
                        </button>
                        <button class="pattern-card" data-pattern="calm">
                            <span class="pattern-name">カーム</span>
                            <span class="pattern-desc">落ち着き</span>
                        </button>
                    </div>
                </div>

                <!-- Pattern Info -->
                <div class="pattern-info" id="patternInfo">
                    <span class="phase-label" id="phaseInhale">吸う 4s</span>
                    <span class="phase-separator">→</span>
                    <span class="phase-label" id="phaseHoldIn" style="display:none;">止める 0s →</span>
                    <span class="phase-label" id="phaseExhale">吐く 6s</span>
                    <span class="phase-separator" id="holdOutSep" style="display:none;">→</span>
                    <span class="phase-label" id="phaseHoldOut" style="display:none;">止める 0s</span>
                    <span class="phase-count">× <span id="breathTotal">5</span>回</span>
                </div>

                <!-- Breathing Circle -->
                <div class="breathing-area">
                    <div class="breathing-ring" id="breathingRing">
                        <div class="breathing-circle" id="breathingCircle">
                            <div class="circle-content">
                                <div class="phase-text" id="phaseText">準備OK</div>
                                <div class="timer-text" id="timerText"></div>
                            </div>
                        </div>
                        <!-- Progress ring -->
                        <svg class="progress-ring" id="progressRing" viewBox="0 0 280 280">
                            <circle class="progress-ring-bg" cx="140" cy="140" r="130" />
                            <circle class="progress-ring-fill" id="progressRingFill" cx="140" cy="140" r="130" />
                        </svg>
                    </div>
                </div>

                <!-- Session Progress -->
                <div class="session-progress" id="sessionProgress">
                    <span id="breathCount">0</span> / <span id="breathTarget">5</span> 回
                </div>

                <!-- Controls -->
                <div class="controls">
                    <button class="btn-start" id="startBtn">はじめる</button>
                    <button class="btn-stop hidden" id="stopBtn">やめる</button>
                </div>

                <!-- Completion Message -->
                <div class="completion hidden" id="completionArea">
                    <div class="completion-message">
                        <h2 id="completionTitle">おつかれさまでした</h2>
                        <p id="completionText"></p>
                        <!-- Mood Rating -->
                        <div class="mood-section">
                            <p>今の気分は？</p>
                            <div class="mood-buttons" id="moodButtons">
                                <button class="mood-btn" data-mood="1" title="つらい">😣</button>
                                <button class="mood-btn" data-mood="2" title="やや不調">😐</button>
                                <button class="mood-btn" data-mood="3" title="普通">🙂</button>
                                <button class="mood-btn" data-mood="4" title="良い">😊</button>
                                <button class="mood-btn" data-mood="5" title="最高">😌</button>
                            </div>
                        </div>
                        <button class="btn-start" id="saveSessionBtn" disabled>記録して終了</button>
                        <button class="btn-secondary" id="skipSaveBtn">記録せずに戻る</button>
                    </div>
                </div>
            </section>

            <!-- Stats Section -->
            <section class="stats-section">
                <div class="tabs">
                    <button class="tab-btn active" data-tab="overview">概要</button>
                    <button class="tab-btn" data-tab="history">履歴</button>
                    <button class="tab-btn" data-tab="settings">設定</button>
                </div>

                <!-- Overview Tab -->
                <div class="tab-content active" id="overview">
                    <div class="stats-grid">
                        <div class="stat-card">
                            <h3>今日のセッション</h3>
                            <div class="stat-value" id="todaySessions">0</div>
                        </div>
                        <div class="stat-card">
                            <h3>合計セッション</h3>
                            <div class="stat-value" id="totalSessions">0</div>
                        </div>
                        <div class="stat-card">
                            <h3>合計呼吸数</h3>
                            <div class="stat-value" id="totalBreaths">0</div>
                        </div>
                        <div class="stat-card highlight">
                            <h3>連続日数</h3>
                            <div class="stat-value" id="streakDays">0</div>
                            <div class="stat-subtitle">日</div>
                        </div>
                    </div>

                    <div class="chart-container">
                        <h3>週間アクティビティ</h3>
                        <canvas id="weeklyChart"></canvas>
                    </div>

                    <div class="chart-container">
                        <h3>気分の推移</h3>
                        <canvas id="moodChart"></canvas>
                    </div>
                </div>

                <!-- History Tab -->
                <div class="tab-content" id="history">
                    <div class="history-list" id="historyList">
                        <p class="empty-message">まだ記録がありません</p>
                    </div>
                    <button class="btn-secondary btn-danger" id="clearDataBtn">全データを削除</button>
                </div>

                <!-- Settings Tab -->
                <div class="tab-content" id="settings">
                    <div class="settings-container">
                        <div class="setting-group">
                            <h3>カスタム呼吸パターン</h3>
                            <div class="setting-row">
                                <label for="customInhale">吸う（秒）</label>
                                <input type="number" id="customInhale" min="1" max="20" value="4">
                            </div>
                            <div class="setting-row">
                                <label for="customHoldIn">止める - 吸った後（秒）</label>
                                <input type="number" id="customHoldIn" min="0" max="20" value="0">
                            </div>
                            <div class="setting-row">
                                <label for="customExhale">吐く（秒）</label>
                                <input type="number" id="customExhale" min="1" max="20" value="6">
                            </div>
                            <div class="setting-row">
                                <label for="customHoldOut">止める - 吐いた後（秒）</label>
                                <input type="number" id="customHoldOut" min="0" max="20" value="0">
                            </div>
                            <div class="setting-row">
                                <label for="customBreaths">呼吸回数</label>
                                <input type="number" id="customBreaths" min="1" max="30" value="5">
                            </div>
                            <button class="btn-start" id="saveCustomBtn">カスタムパターンを保存</button>
                        </div>

                        <div class="setting-group">
                            <h3>ガイド音</h3>
                            <div class="setting-row">
                                <label for="soundToggle">効果音</label>
                                <label class="toggle">
                                    <input type="checkbox" id="soundToggle" checked>
                                    <span class="toggle-slider"></span>
                                </label>
                            </div>
                        </div>

                        <div class="setting-group">
                            <h3>バイブレーション</h3>
                            <div class="setting-row">
                                <label for="vibrationToggle">フェーズ切替時に振動</label>
                                <label class="toggle">
                                    <input type="checkbox" id="vibrationToggle" checked>
                                    <span class="toggle-slider"></span>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/5-breaths/service-worker.js', {
                    scope: '/5-breaths/'
                })
                    .then((registration) => {
                        console.log('ServiceWorker registered:', registration.scope);
                    })
                    .catch((error) => {
                        console.log('ServiceWorker registration failed:', error);
                    });
            });
        }
    </script>
</body>
</html>
